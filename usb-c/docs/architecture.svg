<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1360 920" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Block diagram: GW5AT FPGA drives DP lanes and AUX into the TUSB1046A crosspoint and out to the USB-C receptacle. An ESP32-S3 controls the crosspoint, an FUSB302B CC PHY, the VBUS switch, and the FPGA's HPD, and carries USB 2.0 to the receptacle.">
<style>
  text { fill: #1f2a2d; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
  .role { fill: #5d6d72; font-size: 10.5px; }
  .chip { font-size: 13px; font-weight: 600; }
  .sub  { font-size: 11px; font-weight: 600; }
  .net  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
          font-size: 10px; fill: #5d6d72; }
  .netstrong { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
               font-size: 10px; font-weight: 700; }
</style>
<rect x="0" y="0" width="1360" height="920" fill="#f7f9f8"/>
<text x="60" y="905" class="role">Generated from usb-c/SPEC.md - FUSB302B + ESP32-S3 + TUSB1046A-DCI, 5 V/1 A source, bus-powered device mode, pin assignment C, roles paired at attach.</text>


  <!-- ============ clock sources ============ -->
  <g>
    <rect x="60" y="18" width="150" height="46" rx="4" fill="none" stroke="#b9c6c8"/>
    <text x="74" y="37" class="sub">50 MHz osc</text>
    <text x="74" y="52" class="role">fabric PLLs (AUX 100 M, pixel 148.5 M)</text>
    <rect x="250" y="18" width="176" height="46" rx="4" fill="none" stroke="#b9c6c8"/>
    <text x="264" y="37" class="sub">135 MHz LVDS XO</text>
    <text x="264" y="52" class="role">GTR12 refclk (AC-coupled)</text>
    <path d="M135 64 V 90" stroke="#5d6d72" stroke-dasharray="2 3" fill="none"/>
    <path d="M367 64 V 90" stroke="#5d6d72" stroke-dasharray="2 3" fill="none"/>
  </g>

  <!-- ============ FPGA ============ -->
  <rect x="60" y="90" width="380" height="420" rx="6" fill="none" stroke="#1f2a2d" stroke-width="1.6"/>
  <text x="76" y="114" class="chip">GW5AT-60 FPGA (Arora V)</text>

  <rect x="85" y="130" width="200" height="250" rx="4" fill="none" stroke="#b9c6c8"/>
  <text x="99" y="152" class="sub">dp_transmitter</text>
  <text x="99" y="174" class="role">video front-end (1080p60)</text>
  <text x="99" y="191" class="role">audio SDP engine (48 kHz)</text>
  <text x="99" y="208" class="role">main-link datapath + scrambler</text>
  <text x="99" y="225" class="role">AUX channel + link training</text>
  <text x="99" y="242" class="role">fabric 8b/10b per lane</text>

  <rect x="320" y="130" width="95" height="250" rx="4" fill="none" stroke="#b9c6c8"/>
  <text x="334" y="152" class="sub">GTR12 Q0</text>
  <text x="334" y="167" class="role">2.7 Gb/s</text>

  <rect x="85" y="400" width="200" height="72" rx="4" fill="none" stroke="#b9c6c8"/>
  <text x="99" y="422" class="sub">usbc_dp_control</text>
  <text x="99" y="439" class="role">HPD IRQ pulse + DP reset</text>
  <text x="99" y="454" class="role">bridge (optional)</text>

  <path d="M285 200 H 320 M285 240 H 320" stroke="#0c7f93" stroke-width="2" fill="none"/>

  <!-- ============ TUSB1046A ============ -->
  <rect x="640" y="120" width="250" height="300" rx="6" fill="none" stroke="#1f2a2d" stroke-width="1.6"/>
  <text x="656" y="144" class="chip">TUSB1046A-DCI</text>
  <text x="656" y="161" class="role">lane / AUX crosspoint, redriver</text>
  <text x="656" y="176" class="role">orientation + pin-assignment mux</text>

  <!-- ============ USB-C receptacle ============ -->
  <rect x="1150" y="90" width="150" height="640" rx="6" fill="none" stroke="#1f2a2d" stroke-width="1.6"/>
  <text x="1166" y="114" class="chip">USB-C</text>
  <text x="1166" y="130" class="role">receptacle</text>
  <text x="1166" y="204" class="netstrong" fill="#0c7f93">SS pairs ×4</text>
  <text x="1166" y="364" class="netstrong" fill="#3b6f7c">SBU1 / SBU2</text>
  <text x="1166" y="470" class="netstrong" fill="#6e59a8">D+ / D−</text>
  <text x="1166" y="486" class="net">A6+B6, A7+B7 tied</text>
  <text x="1166" y="589" class="netstrong" fill="#708087">CC1 / CC2</text>
  <text x="1166" y="659" class="netstrong" fill="#a8700d">VBUS</text>

  <!-- ============ DP lanes FPGA -> 1046 ============ -->
  <path d="M415 170 H 640" stroke="#0c7f93" stroke-width="2.5" fill="none"/>
  <path d="M415 210 H 640" stroke="#0c7f93" stroke-width="2.5" fill="none"/>
  <text x="440" y="162" class="netstrong" fill="#0c7f93">ML0 / ML1 · 2.7 Gb/s + AC caps</text>
  <path d="M415 255 H 640" stroke="#86b8c2" stroke-width="2" stroke-dasharray="6 5" fill="none"/>
  <path d="M415 295 H 640" stroke="#86b8c2" stroke-width="2" stroke-dasharray="6 5" fill="none"/>
  <text x="440" y="285" class="net">ML2 / ML3 wired, unused (future 4-lane)</text>

  <!-- AUX -->
  <path d="M440 440 H 560 V 360 H 640" stroke="#3b6f7c" stroke-width="1.8" fill="none"/>
  <text x="452" y="432" class="netstrong" fill="#3b6f7c">AUX± (bias network)</text>

  <!-- ============ 1046 -> connector ============ -->
  <path d="M890 200 H 1150" stroke="#0c7f93" stroke-width="2.5" fill="none"/>
  <path d="M890 360 H 1150" stroke="#3b6f7c" stroke-width="1.8" fill="none"/>
  <text x="912" y="192" class="net">pin assignment C: all four pairs → DP</text>

  <!-- ============ ESP32-S3 ============ -->
  <rect x="420" y="560" width="280" height="170" rx="6" fill="none" stroke="#1f2a2d" stroke-width="1.6"/>
  <text x="436" y="584" class="chip">ESP32-S3</text>
  <text x="436" y="604" class="role">PD + DP Alt Mode policy (usb-c/)</text>
  <text x="436" y="621" class="role">USB 2.0 host / device (mode-paired)</text>
  <text x="436" y="638" class="role">HPD reconstruction from VDMs</text>
  <text x="436" y="655" class="role">board config I²C master</text>

  <!-- 1046 control bundle -->
  <path d="M765 420 V 500 H 560 V 560" stroke="#708087" stroke-width="1.6" fill="none"/>
  <text x="583" y="493" class="netstrong" fill="#708087">FLIP · CTL0 · CTL1 · HPDIN</text>
  <text x="583" y="507" class="net">GPIO ×4 (power-up: pulse CTL0)</text>

  <!-- ESP32 -> FPGA -->
  <path d="M420 612 H 185 V 510" stroke="#708087" stroke-width="1.6" fill="none"/>
  <path d="M185 517 l -4 8 h 8 z" fill="#708087"/>
  <text x="200" y="604" class="netstrong" fill="#708087">DP_EN · HPD level · HPD IRQ toggle</text>

  <!-- ============ FUSB302B ============ -->
  <rect x="760" y="560" width="190" height="100" rx="6" fill="none" stroke="#1f2a2d" stroke-width="1.6"/>
  <text x="776" y="584" class="chip">FUSB302B</text>
  <text x="776" y="601" class="role">CC PHY · BMC · auto-CRC/retry</text>
  <text x="776" y="617" class="role">DRP toggle · VBUS sense</text>

  <path d="M700 620 H 760" stroke="#708087" stroke-width="1.4" stroke-dasharray="5 4" fill="none"/>
  <text x="704" y="612" class="net">I²C + INT_N</text>

  <path d="M950 585 H 1150" stroke="#708087" stroke-width="1.8" fill="none"/>

  <!-- ============ 5V switch ============ -->
  <rect x="760" y="690" width="190" height="64" rx="6" fill="none" stroke="#1f2a2d" stroke-width="1.6"/>
  <text x="776" y="712" class="chip">5 V source switch</text>
  <text x="776" y="729" class="role">hardware limit ≈ 1 A, reverse block</text>

  <path d="M700 700 H 728 V 716 H 760" stroke="#708087" stroke-width="1.4" fill="none"/>
  <text x="640" y="694" class="net">VBUS_EN</text>

  <path d="M950 722 H 1100 V 655 H 1150" stroke="#a8700d" stroke-width="2.2" fill="none"/>
  <path d="M1143 651 l 7 4 -7 4 z" fill="#a8700d"/>
  <text x="966" y="714" class="netstrong" fill="#a8700d">5 V · 1 A budget</text>
  <text x="966" y="740" class="net">device mode: switch off; host 5 V may bus-power the board (&#8804;500 mA)</text>

  <!-- VBUS sense -->
  <path d="M900 660 V 722" stroke="#a8700d" stroke-width="1.2" stroke-dasharray="4 4" fill="none"/>
  <circle cx="900" cy="722" r="2.6" fill="#a8700d"/>
  <text x="906" y="684" class="net">sense</text>

  <!-- ============ USB 2.0 ============ -->
  <path d="M700 680 H 1080 V 591" stroke="#6e59a8" stroke-width="2" fill="none"/>
  <path d="M1080 579 V 465 H 1150" stroke="#6e59a8" stroke-width="2" fill="none"/>
  <text x="726" y="672" class="netstrong" fill="#6e59a8">USB 2.0 D+/D− (bypasses crosspoint)</text>

  <!-- ============ legend ============ -->
  <g>
    <text x="60" y="790" class="sub">Legend</text>
    <path d="M60 812 h 44" stroke="#0c7f93" stroke-width="2.5"/>
    <text x="112" y="816" class="role">high-speed differential (DP / SS)</text>
    <path d="M330 812 h 44" stroke="#3b6f7c" stroke-width="1.8"/>
    <text x="382" y="816" class="role">AUX / SBU</text>
    <path d="M490 812 h 44" stroke="#6e59a8" stroke-width="2"/>
    <text x="542" y="816" class="role">USB 2.0</text>
    <path d="M640 812 h 44" stroke="#a8700d" stroke-width="2.2"/>
    <text x="692" y="816" class="role">power</text>

    <path d="M60 842 h 44" stroke="#708087" stroke-width="1.6"/>
    <text x="112" y="846" class="role">control GPIO</text>
    <path d="M330 842 h 44" stroke="#708087" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="382" y="846" class="role">I²C / status</text>
    <path d="M490 842 h 44" stroke="#86b8c2" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="542" y="846" class="role">wired, unused</text>
    <path d="M640 842 h 44" stroke="#5d6d72" stroke-dasharray="2 3"/>
    <text x="692" y="846" class="role">reference clock</text>
  </g>
</svg>